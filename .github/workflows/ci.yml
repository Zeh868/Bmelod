name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:

jobs:
  unit-default:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure default build
        run: cmake -B build
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  unit-hybrid:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure hybrid build
        run: >
          cmake -B build-hybrid
          -DBM_ENABLE_HRT=ON
          -DBM_ENABLE_TICKER=ON
          -DBM_ENABLE_EXEC=ON
          -DBM_ENABLE_STREAM=ON
          -DBM_ENABLE_SYNC=ON
      - name: Build
        run: cmake --build build-hybrid --config Debug
      - name: Test
        run: ctest --test-dir build-hybrid -C Debug --output-on-failure

  config-template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bm_config.h.template stays in sync with include/bm_config.h
        run: python3 tools/check_config_template.py

  cmake-matrix:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: "-DBM_ENABLE_HRT=ON"
          - args: "-DBM_ENABLE_TICKER=ON"
          - args: "-DBM_ENABLE_HRT=ON -DBM_ENABLE_TICKER=ON -DBM_ENABLE_EXEC=ON -DBM_ENABLE_STREAM=ON"
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build-matrix ${{ matrix.args }}
      - name: Build
        run: cmake --build build-matrix --config Debug

  cmake-invalid:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expect configure failure
        shell: pwsh
        run: |
          cmake -B build-bad -DBM_ENABLE_EXEC=ON -DBM_ENABLE_HRT=OFF
          if ($LASTEXITCODE -eq 0) { exit 1 }

  native-examples:
    runs-on: windows-latest
    strategy:
      matrix:
        example:
          - hrt_servo_stub
          - stream_block_rms
          - daq_frontend
          - ultrasonic_frontend
          - stream_fft
          - stream_bms_pipeline
          - stream_audio_agc
          - stream_vibration_diag
          - stream_vision_frame
          - multi_axis_sync
    steps:
      - uses: actions/checkout@v4
      - name: Build and run native_sim example
        shell: pwsh
        run: |
          cmake -S Demo/${{ matrix.example }} -B build/demo/native/${{ matrix.example }} -DNATIVE_SIM_BUILD=ON
          cmake --build build/demo/native/${{ matrix.example }} --config Debug
          $exe = Get-ChildItem -Path build/demo/native/${{ matrix.example }} -Recurse -Filter "${{ matrix.example }}.exe" | Select-Object -First 1
          $out = & $exe.FullName 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($out -notmatch ': PASS') { Write-Error 'Example did not report PASS'; exit 1 }

  qemu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm
      - name: Build and run QEMU smoke + hybrid examples
        run: |
          chmod +x tools/demo/run_qemu.sh tests/qemu/run_hybrid_smoke.sh tests/qemu/run_all.sh
          bash tests/qemu/run_all.sh

  arch-riscv-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RISC-V toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv32-unknown-elf \
            gcc-riscv64-unknown-elf \
            qemu-system-riscv64
      - name: Build arch smoke and run QEMU RV64
        run: |
          chmod +x tests/arch/run_all.sh
          bash tests/arch/run_all.sh

  qemu-icount-determinism:
    # L2 QEMU icount 控制流确定性（ARM Cortex-A15 线）
    # 见 docs/04-测试与排障/05-确定性验证操作手册.md；Δ==0 = 控制流确定，非 WCET 证明。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm
      - name: Configure
        run: |
          cmake -G 'Unix Makefiles' -B build_icount_arm -S tests/qemu_cortexa_icount \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-arm-none-eabi-a.cmake
      - name: Build
        run: cmake --build build_icount_arm
      - name: Run determinism-l2 tests
        run: ctest --test-dir build_icount_arm -L determinism-l2 --output-on-failure
